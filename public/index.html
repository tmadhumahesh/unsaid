<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unsaid</title>
  <meta property="og:title" content="Unsaid">
  <meta property="og:description" content="What you wish you could say but can't.">
  <meta property="og:image" content="/og.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1 class="logo">Unsaid.</h1>
      <div class="header-end">
        <nav>
          <button id="btn-write" class="nav-btn active">Say</button>
          <button id="btn-void" class="nav-btn">Void</button>
        </nav>
        <button id="btn-theme" class="theme-btn" aria-label="Toggle theme"></button>
      </div>
    </header>

    <main>
      <section id="view-write">
        <div class="input-stage" id="stage-input">
          <label for="unsaid-input" class="prompt" id="prompt-label">What do you wish you could say?</label>
          <div id="shared-context" class="shared-context hidden"></div>
          <textarea id="unsaid-input" rows="3" placeholder="Type it here..." maxlength="500"></textarea>
          <div class="char-count"><span id="char-count">0</span>/500</div>
        </div>

        <div class="choice-stage hidden" id="stage-choice">
          <div class="preview-text" id="preview-text"></div>
          <p class="choice-prompt">What do you want to do with this?</p>
          <div class="choice-buttons">
            <button id="btn-release" class="choice-btn release">
              <span class="choice-icon">&#9733;</span>
              Release to the Void
              <span class="choice-desc">It joins your collection of unsaid things</span>
            </button>
            <button id="btn-burn" class="choice-btn burn">
              <span class="choice-icon">&#128293;</span>
              Burn It
              <span class="choice-desc">It disappears forever. Just you and this moment.</span>
            </button>
          </div>
          <button id="btn-back" class="back-link">&larr; Write something else</button>
        </div>

        <div class="animation-stage hidden" id="stage-anim">
          <div id="anim-container">
            <div id="anim-text" class="anim-text"></div>
          </div>
          <div class="anim-done hidden" id="anim-done">
            <p id="done-message" class="done-message"></p>
            <div class="viral-actions" id="viral-actions">
              <button id="btn-share-card" class="choice-btn">
                <span class="choice-icon">&#128247;</span>
                Share as Card
                <span class="choice-desc">A beautiful image to post anywhere</span>
              </button>
              <button id="btn-copy-link" class="choice-btn secondary">
                <span class="choice-icon">&#128279;</span>
                Copy Share Link
                <span class="choice-desc">Send this message to someone</span>
              </button>
            </div>
            <div class="done-buttons" style="margin-top:12px">
              <button id="btn-again" class="choice-btn">Say something else</button>
              <button id="btn-go-void" class="choice-btn secondary">Browse the Void</button>
            </div>
          </div>
        </div>
      </section>

      <section id="view-void" class="hidden">
        <h2 class="void-title">Your Void</h2>
        <p class="void-subtitle">Everything you've released.</p>
        <div id="void-feed" class="void-feed"></div>
        <div id="void-empty" class="void-empty hidden">
          <p>You haven't released anything yet.</p>
          <p style="font-size:0.9rem;margin-top:8px;font-style:normal">The void waits.</p>
        </div>
      </section>
    </main>

    <footer>
      <p>What will you leave unsaid?</p>
    </footer>
  </div>

  <div id="share-modal" class="modal hidden">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modal-close">&times;</button>
      <canvas id="card-canvas" class="card-canvas"></canvas>
      <img id="card-gif" class="card-canvas hidden" alt="Animated card">
      <div class="card-actions">
        <button id="btn-download-card" class="choice-btn" title="Download static card">
          <span class="choice-icon">&#11015;&#65039;</span>
          Download
        </button>
        <button id="btn-gif" class="choice-btn secondary" title="Generate animated GIF">
          <span class="choice-icon">&#128373;&#65039;</span>
          Animate
        </button>
      </div>
      <div class="card-actions social-actions">
        <button id="btn-share-twitter" class="social-btn twitter" title="Share on X">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </button>
        <button id="btn-share-facebook" class="social-btn facebook" title="Share on Facebook">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        </button>
        <button id="btn-share-linkedin" class="social-btn linkedin" title="Share on LinkedIn">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        </button>
        <button id="btn-copy-card-link" class="social-btn copy" title="Copy link">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M7 4V2a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v2h4a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h4zm0 2H4v14h16V6h-3v2H7V6zm2-3v2h6V3H9zm0 9l-1.5 1.5L9 15l4-4-1.5-1.5L9 9zm6 0l-1.5-1.5L12 9l4 4-1.5 1.5L15 12z"/></svg>
        </button>
      </div>
      <div id="gif-loading" class="gif-loading hidden">Rendering animation...</div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
